version: "3.9"

services:
  service-a:
    build: ./service-a
    ports:
      - "5000:5000"
    container_name: service-a
    restart: always

  service-b:
    build: ./service-b
    container_name: service-b
    depends_on:
      - service-a
    environment:
      - SERVICE_A_URL=http://service-a:5000
    restart: always
